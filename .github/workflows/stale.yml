name: Mark stale issues and pull requests

on:
  schedule:
  - cron: '41 1 * * *'

jobs:
  stale:

    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v5
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-label: 'no-activity'
        stale-pr-label: 'no-activity'
